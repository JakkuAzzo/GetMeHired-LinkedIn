<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="hero">
      <p class="eyebrow">LinkedIn Easy Apply</p>
      <h2>GetMeHired</h2>
      <p class="subtitle">Load your profile once, then run the same Easy Apply flow you used manually on LinkedIn.</p>
    </div>

    <form id="jobSearchForm">
      <div class="field-grid">
        <label>
          Full Name
          <input type="text" id="fullName" placeholder="Nathan Brown-Bennett">
        </label>

        <label>
          Email
          <input type="email" id="email" placeholder="nathan-brown-bennett@hotmail.com">
        </label>

        <label>
          Phone
          <input type="text" id="phone" placeholder="07800931786">
        </label>

        <label>
          Current Location
          <input type="text" id="location" placeholder="London">
        </label>

        <label>
          Current Company
          <input type="text" id="currentCompany" placeholder="Lunarversal">
        </label>

        <label>
          Years of Experience
          <input type="number" id="yearsExperience" min="0" max="99" placeholder="3">
        </label>

        <label>
          GitHub URL
          <input type="url" id="githubUrl" placeholder="https://github.com/NathanBrownBennett">
        </label>

        <label>
          Portfolio URL
          <input type="url" id="portfolioUrl" placeholder="https://nathanbrownbennett.github.io/NathanBrown-Bennett/">
        </label>
      </div>

      <div class="toggles">
        <label><input type="checkbox" id="workAuthorized"> UK work authorization</label>
        <label><input type="checkbox" id="sponsorshipRequired"> Sponsorship required</label>
        <label><input type="checkbox" id="hybridOk" checked> Hybrid roles OK</label>
        <label><input type="checkbox" id="openSourceContribution"> Open-source contribution</label>
      </div>

      <label class="keywords-block">
        CV Match Keywords
        <textarea id="cvKeywords" rows="3" placeholder="cyber security, security engineer, application security, devsecops, soc, threat intelligence"></textarea>
      </label>

      <label class="resume-block">
        Resume PDF
        <input type="file" id="cvUpload" accept="application/pdf">
        <span id="resumeStatus">No resume uploaded yet.</span>
      </label>

      <div class="actions">
        <button id="saveBtn" type="button">Save Profile</button>
        <button id="runBtn" type="button" disabled>Run on LinkedIn Tab</button>
        <button id="stopBtn" type="button" class="danger">Stop</button>
      </div>

      <p class="note">Run starts continuous matching and Easy Apply attempts. It keeps going across results until you press Stop.</p>
      <pre id="statusLog">Idle.</pre>
    </form>
  </div>
  <script src="popup.js"></script>
</body>
</html>
